<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDT - Team Premier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(100deg, #000000, #764ba2, #7c3b68);
            color: #fff;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
        }
        h2 {
            text-align: center;
            font-size: 1.5rem;
            margin: 0 0 1rem 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        th, td {
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px;
            text-align: center;
        }
        th {
            background: rgba(255,255,255,0.2);
            font-weight: bold;
        }
        td {
            min-height: 60px;
        }
        .back-btn, .btn {
            display: inline-block;
            margin: 0.5rem;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .back-btn:hover, .btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        #authZone {
            text-align: center;
            margin: 20px auto;
            max-width: 1400px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        #mdpInput {
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            margin-right: 10px;
            width: 200px;
        }
        #mdpInput::placeholder {
            color: rgba(255,255,255,0.5);
        }
        #loginError {
            color: #ff6b6b;
            margin-top: 10px;
        }

        .edt-perso-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .edt-perso-table th,
        .edt-perso-table td {
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px;
            text-align: center;
        }
        .edt-perso-table th {
            background: rgba(255,255,255,0.2);
            font-weight: bold;
        }
        .contrainte-input {
            display: block;
            margin-top: 4px;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 0.75rem;
            width: 100%;
            box-sizing: border-box;
        }
        .contrainte-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .save-indicator {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-left: 10px;
        }
        #generalTableHead th:nth-child(2),
        #generalTableHead th:nth-child(3),
        #generalTableBody td:nth-child(2),
        #generalTableBody td:nth-child(3) {
            width: 60px;
            min-width: 60px;
        }
    </style>
</head>
<body>
    <div id="authZone">
        <div id="stateButton">
            <button class="btn" id="btnModifier">Modifier votre présence</button>
        </div>
        <div id="stateLogin" style="display:none;">
            <input type="password" id="mdpInput" placeholder="Mot de passe">
            <button class="btn" id="btnValider">Valider</button>
            <button class="btn btn-secondary" id="btnFermerLogin">Fermer</button>
            <p id="loginError"></p>
        </div>
        <div id="stateEdt" style="display:none;">
            <div id="edtPersonnelContainer"></div>
            <div style="margin-top:15px;">
                <span class="save-indicator" id="saveIndicator"></span>
                <button class="btn btn-secondary" id="btnDeconnexion">Se déconnecter</button>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>Emploi du Temps</h1>
        <table>
            <thead id="generalTableHead">
                <!-- Généré par JS -->
            </thead>
            <tbody id="generalTableBody">
                <!-- Généré par JS -->
            </tbody>
        </table>
        <div id="calendrierInfos" style="margin-top:15px; text-align:center; font-size:0.95rem; background:rgba(255,255,255,0.05); padding:12px; border-radius:8px;">
            <span style="color:#4CAF50; font-weight:bold;">Match</span> : jeudi, samedi, dimanche &nbsp;&nbsp;|&nbsp;&nbsp;
            <span style="color:#FF9800; font-weight:bold;">Entraînement</span> : mercredi, vendredi
        </div>
        <div style="text-align:center;">
            <a href="index.html" class="back-btn">Retour à l'accueil</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, doc, getDocs, setDoc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTkuOD4jnR3tvmkAxKR5UM0nB6RNqWC1M",
            authDomain: "premierteam-plouf.firebaseapp.com",
            projectId: "premierteam-plouf",
            storageBucket: "premierteam-plouf.firebasestorage.app",
            messagingSenderId: "511246296521",
            appId: "1:511246296521:web:2f4b07c682ee25dd6d3418"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const JOURS = ["lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi", "dimanche"];
        const CALENDRIER = [
            { jour: "Lu", horaire: "&mdash;", type: "off" },
            { jour: "Ma", horaire: "&mdash;", type: "off" },
            { jour: "Me", horaire: "19h-20h", type: "entrainement" },
            { jour: "Je", horaire: "19h-20h", type: "match" },
            { jour: "Ve", horaire: "20h-21h", type: "entrainement" },
            { jour: "Sa", horaire: "20h-21h", type: "match" },
            { jour: "Di", horaire: "19h-20h", type: "match" }
        ];
        const NOMS_JOURS = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];

        const MEMBRES_DATA = [
            { id: "morgane", nom: "Morgane", surnom: "MK", mdp: "14022019", mdp_admin: "Admin_mk_11" },
            { id: "enzo", nom: "Enzo", surnom: "Misu", mdp: "2323", mdp_admin: "Admin_misu_12" },
            { id: "jules", nom: "Jules", surnom: "FDM", mdp: "julesf0128" },
            { id: "sebastien", nom: "Sébastien", surnom: "Pollux", mdp: "Honda06+" },
            { id: "orphee", nom: "Orphée", surnom: "Orphée", mdp: "jemeraivoiralexiaenrobedechambre69" },
            { id: "octave", nom: "Octave", surnom: "sacadUwU", mdp: "motdepasse.1" },
            { id: "clement", nom: "Clément", surnom: "Clemrsse", mdp: "clemrsse123" }
        ];

        async function seedFirestore() {
            try {
                const snapshot = await getDocs(collection(db, "membres"));
                if (snapshot.size > 0) return;

                for (const m of MEMBRES_DATA) {
                    const edt = {};
                    for (const jour of JOURS) {
                        edt[jour] = { statut: "absent_reponse", contrainte: "" };
                    }
                    await setDoc(doc(db, "membres", m.id), {
                        nom: m.nom,
                        mdp: m.mdp,
                        ...(m.mdp_admin ? { mdp_admin: m.mdp_admin } : {}),
                        edt
                    });
                }
                console.log("Firestore peupl\u00e9 avec les 7 membres");
            } catch (e) {
                console.error("Erreur seed Firestore :", e);
            }
        }
        seedFirestore();

        function getWeekDates() {
            const now = new Date();
            const day = now.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            const monday = new Date(now);
            monday.setDate(now.getDate() + diff);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                const dd = String(d.getDate()).padStart(2, "0");
                const mm = String(d.getMonth() + 1).padStart(2, "0");
                dates.push(dd + "/" + mm);
            }
            return dates;
        }

        async function chargerTableauGeneral() {
            const head = document.getElementById("generalTableHead");
            const tbody = document.getElementById("generalTableBody");
            if (!head || !tbody) return;

            head.innerHTML = "";
            const weekDates = getWeekDates();
            const tr = document.createElement("tr");
            const thLabel = document.createElement("th");
            thLabel.textContent = "Membres";
            tr.appendChild(thLabel);

            for (let i = 0; i < 7; i++) {
                const th = document.createElement("th");
                const cal = CALENDRIER[i];
                if (cal.type === "off") {
                    th.style.background = "rgba(0,0,0,0.15)";
                    th.style.color = "rgba(255,255,255,0.4)";
                }
                th.innerHTML = NOMS_JOURS[i] +
                    "<br><span style='font-size:0.75rem;font-weight:normal;'>" + weekDates[i] +
                    "</span><br><span style='font-size:0.75rem;font-weight:normal;'>" + cal.horaire +
                    "</span><br><span style='font-size:0.7rem;font-weight:normal;opacity:0.8;'>" +
                    (cal.type === "off" ? "" : (cal.type === "entrainement" ? "Entra\u00eenement" : "Match")) + "</span>";
                tr.appendChild(th);
            }
            head.appendChild(tr);

            // Corps
            tbody.innerHTML = "";
            const snapshot = await getDocs(collection(db, "membres"));
            const membres = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            membres.sort((a, b) => MEMBRES_DATA.findIndex(m => m.id === a.id) - MEMBRES_DATA.findIndex(m => m.id === b.id));

            for (const membre of membres) {
                const tr = document.createElement("tr");
                const tdNom = document.createElement("td");
                tdNom.textContent = membre.nom || membre.id;
                tdNom.style.fontWeight = "bold";
                tr.appendChild(tdNom);

                for (let i = 0; i < JOURS.length; i++) {
                    const td = document.createElement("td");
                    const jour = JOURS[i];
                    const cal = CALENDRIER[i];

                    if (cal.type === "off") {
                        td.style.background = "rgba(0,0,0,0.12)";
                        td.textContent = "\u2014";
                        td.style.color = "rgba(255,255,255,0.3)";
                    } else {
                        const statut = membre.edt?.[jour]?.statut || "absent_reponse";
                        const dot = document.createElement("div");
                        dot.style.width = "20px";
                        dot.style.height = "20px";
                        dot.style.borderRadius = "50%";
                        dot.style.margin = "0 auto";
                        dot.style.background = getColorForStatut(statut);
                        dot.style.border = "2px solid rgba(255,255,255,0.3)";
                        td.appendChild(dot);
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        chargerTableauGeneral();

        const stateButton = document.getElementById("stateButton");
        const stateLogin = document.getElementById("stateLogin");
        const stateEdt = document.getElementById("stateEdt");
        const btnModifier = document.getElementById("btnModifier");
        const btnValider = document.getElementById("btnValider");
        const btnFermerLogin = document.getElementById("btnFermerLogin");
        const btnDeconnexion = document.getElementById("btnDeconnexion");
        const mdpInput = document.getElementById("mdpInput");
        const loginError = document.getElementById("loginError");
        const edtPersonnelContainer = document.getElementById("edtPersonnelContainer");
        const saveIndicator = document.getElementById("saveIndicator");

        let currentMembreId = null;
        let currentIsAdmin = false;

        // Restaurer la session
        const savedId = sessionStorage.getItem("membreId");
        const savedAdmin = sessionStorage.getItem("isAdmin");
        if (savedId && savedAdmin !== null) {
            currentMembreId = savedId;
            currentIsAdmin = savedAdmin === "true";
            // Recharger l'EDT perso
            const snap = await getDoc(doc(db, "membres", savedId));
            if (snap.exists()) {
                afficherEdtPersonnel(snap.data());
                showState("edt");
            }
        }

        function showState(state) {
            stateButton.style.display = "none";
            stateLogin.style.display = "none";
            stateEdt.style.display = "none";
            if (state === "button") stateButton.style.display = "block";
            else if (state === "login") stateLogin.style.display = "block";
            else if (state === "edt") stateEdt.style.display = "block";
        }

        btnModifier.addEventListener("click", () => {
            mdpInput.value = "";
            loginError.textContent = "";
            showState("login");
        });

        btnFermerLogin.addEventListener("click", () => showState("button"));
        mdpInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") btnValider.click();
        });
        btnDeconnexion.addEventListener("click", () => {
            currentMembreId = null;
            currentIsAdmin = false;
            sessionStorage.removeItem("membreId");
            sessionStorage.removeItem("isAdmin");
            showState("button");
        });

        btnValider.addEventListener("click", async () => {
            const mdp = mdpInput.value.trim();
            if (!mdp) return;

            // Vérifier d'abord les mots de passe admin
            const qAdmin = query(collection(db, "membres"), where("mdp_admin", "==", mdp));
            const adminSnapshot = await getDocs(qAdmin);

            let membreId = null;
            let membreData = null;
            let isAdmin = false;

            if (adminSnapshot.size > 0) {
                membreId = adminSnapshot.docs[0].id;
                membreData = adminSnapshot.docs[0].data();
                isAdmin = true;
            } else {
                const q = query(collection(db, "membres"), where("mdp", "==", mdp));
                const snapshot = await getDocs(q);
                if (snapshot.size > 0) {
                    membreId = snapshot.docs[0].id;
                    membreData = snapshot.docs[0].data();
                    isAdmin = false;
                }
            }

            if (!membreId) {
                loginError.textContent = "Mot de passe incorrect";
                return;
            }

            currentMembreId = membreId;
            currentIsAdmin = isAdmin;
            sessionStorage.setItem("membreId", currentMembreId);
            sessionStorage.setItem("isAdmin", currentIsAdmin);
            loginError.textContent = "";
            afficherEdtPersonnel(membreData);
            showState("edt");
        });

        async function afficherEdtPersonnel(data) {
            const surnom = MEMBRES_DATA.find(m => m.id === currentMembreId)?.surnom || data.nom;
            edtPersonnelContainer.innerHTML = "";

            const wrapper = document.createElement("div");
            wrapper.style.display = "flex";
            wrapper.style.alignItems = "flex-start";
            wrapper.style.gap = "20px";
            wrapper.style.justifyContent = "center";

            const left = document.createElement("div");
            left.style.minWidth = "120px";
            left.style.textAlign = "left";
            left.style.paddingTop = "30px";
            const welcome = document.createElement("div");
            welcome.style.fontSize = "1.2rem";
            welcome.style.fontWeight = "bold";
            welcome.innerHTML = currentIsAdmin ? "Bienvenue<br>Admin" : "Bienvenue<br>" + (surnom || data.nom);
            left.appendChild(welcome);

            const center = document.createElement("div");
            const table = document.createElement("table");
            table.className = "edt-perso-table";

            const thead = document.createElement("thead");
            const headerRow = document.createElement("tr");
            headerRow.appendChild(createTh(""));
            const weekDates = getWeekDates();
            for (let i = 0; i < JOURS.length; i++) {
                const th = document.createElement("th");
                const cal = CALENDRIER[i];
                if (cal.type === "off") {
                    th.style.background = "rgba(0,0,0,0.15)";
                    th.style.color = "rgba(255,255,255,0.4)";
                }
                th.innerHTML = (JOURS[i].charAt(0).toUpperCase() + JOURS[i].slice(1, 3)) +
                    "<br><span style='font-size:0.75rem;font-weight:normal;'>" + weekDates[i] + " " + cal.horaire +
                    "</span><br><span style='font-size:0.7rem;font-weight:normal;opacity:0.8;'>" +
                    (cal.type === "entrainement" ? "Entrainement" : "Match") + "</span>";
                headerRow.appendChild(th);
            }
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement("tbody");
            if (currentIsAdmin) {
                for (const m of MEMBRES_DATA) {
                    tbody.appendChild(await createMembreRow(m.id, m.surnom || m.nom));
                }
            } else {
                tbody.appendChild(await createMembreRow(currentMembreId, surnom || data.nom));
            }
            table.appendChild(tbody);
            center.appendChild(table);

            const right = document.createElement("div");
            right.style.minWidth = "140px";
            right.style.textAlign = "left";
            right.style.paddingTop = "30px";
            const legendTitle = document.createElement("div");
            legendTitle.style.fontWeight = "bold";
            legendTitle.style.marginBottom = "10px";
            legendTitle.textContent = "Légende";
            right.appendChild(legendTitle);

            const legendItems = [
                { value: "absent_reponse", label: "Pas de réponse", color: "#666" },
                { value: "present", label: "Présent", color: "#4CAF50" },
                { value: "absent", label: "Absent", color: "#f44336" },
                { value: "contrainte_horaire", label: "Présent avec contrainte horaires ", color: "#FF9800" },
                { value: "abstention", label: "Je suis là mais je joue seulement si c'est vraiment nécessaire", color: "#6A1B9A" }
            ];

            for (const item of legendItems) {
                const row = document.createElement("div");
                row.style.display = "flex";
                row.style.alignItems = "center";
                row.style.marginBottom = "6px";
                row.style.fontSize = "0.85rem";
                const dot = document.createElement("span");
                dot.style.width = "14px";
                dot.style.height = "14px";
                dot.style.borderRadius = "50%";
                dot.style.display = "inline-block";
                dot.style.marginRight = "8px";
                dot.style.background = item.color;
                dot.style.flexShrink = "0";
                row.appendChild(dot);
                row.appendChild(document.createTextNode(item.label));
                right.appendChild(row);
            }

            wrapper.appendChild(left);
            wrapper.appendChild(center);
            wrapper.appendChild(right);
            edtPersonnelContainer.appendChild(wrapper);
        }

        function createTh(text) {
            const th = document.createElement("th");
            th.textContent = text;
            return th;
        }

        async function createMembreRow(membreId, surnom) {
            const tr = document.createElement("tr");
            const tdNom = document.createElement("td");
            tdNom.textContent = surnom;
            tdNom.style.fontWeight = "bold";
            tdNom.style.fontSize = "0.9rem";
            tr.appendChild(tdNom);

            let edtData = null;
            try {
                const snap = await getDoc(doc(db, "membres", membreId));
                if (snap.exists()) edtData = snap.data().edt || {};
            } catch (e) {
                console.error("Erreur chargement", membreId, e);
            }

            for (const jour of JOURS) {
                const td = document.createElement("td");
                if (jour === "lundi" || jour === "mardi") {
                    td.style.background = "rgba(0,0,0,0.12)";
                    td.textContent = "\u2014";
                    td.style.color = "rgba(255,255,255,0.3)";
                    tr.appendChild(td);
                    continue;
                }
                td.style.padding = "6px";

                const dotContainer = document.createElement("div");
                dotContainer.style.position = "relative";
                dotContainer.style.display = "inline-block";

                const dot = document.createElement("div");
                dot.style.width = "24px";
                dot.style.height = "24px";
                dot.style.borderRadius = "50%";
                dot.style.cursor = "pointer";
                dot.style.border = "2px solid rgba(255,255,255,0.3)";
                dot.style.transition = "transform 0.2s";
                dot.dataset.membreId = membreId;
                dot.dataset.jour = jour;

                const statutActuel = edtData?.[jour]?.statut || "absent_reponse";
                const contrainteActuelle = edtData?.[jour]?.contrainte || "";
                dot.dataset.value = statutActuel;
                dot.dataset.contrainte = contrainteActuelle;
                dot.style.background = getColorForStatut(statutActuel);

                dot.addEventListener("mouseenter", () => { dot.style.transform = "scale(1.2)"; });
                dot.addEventListener("mouseleave", () => { dot.style.transform = "scale(1)"; });

                // Dropdown menu
                const dropdown = document.createElement("div");
                dropdown.className = "statut-dropdown";
                dropdown.style.display = "none";
                dropdown.style.position = "absolute";
                dropdown.style.top = "30px";
                dropdown.style.left = "50%";
                dropdown.style.transform = "translateX(-50%)";
                dropdown.style.background = "#333";
                dropdown.style.borderRadius = "6px";
                dropdown.style.padding = "4px 0";
                dropdown.style.zIndex = "10";
                dropdown.style.boxShadow = "0 4px 12px rgba(0,0,0,0.3)";
                dropdown.style.minWidth = "40px";

                const colors = [
                    { value: "absent_reponse", color: "#666" },
                    { value: "present", color: "#4CAF50" },
                    { value: "absent", color: "#f44336" },
                    { value: "contrainte_horaire", color: "#FF9800" },
                    { value: "abstention", color: "#6A1B9A" }
                ];

                for (const c of colors) {
                    const opt = document.createElement("div");
                    opt.style.width = "28px";
                    opt.style.height = "28px";
                    opt.style.borderRadius = "50%";
                    opt.style.background = c.color;
                    opt.style.margin = "4px auto";
                    opt.style.cursor = "pointer";
                    opt.style.border = "2px solid transparent";
                    opt.dataset.value = c.value;
                    opt.addEventListener("click", (e) => {
                        e.stopPropagation();
                        selectStatut(membreId, jour, c.value, dot, dropdown);
                    });
                    opt.addEventListener("mouseenter", () => { opt.style.borderColor = "#fff"; });
                    opt.addEventListener("mouseleave", () => { opt.style.borderColor = "transparent"; });
                    dropdown.appendChild(opt);
                }

                dot.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const allDropdowns = document.querySelectorAll(".statut-dropdown");
                    allDropdowns.forEach(d => d.style.display = "none");
                    const rect = td.getBoundingClientRect();
                    const spaceBelow = window.innerHeight - rect.bottom;
                    if (spaceBelow < 200) {
                        dropdown.style.top = "auto";
                        dropdown.style.bottom = "30px";
                    } else {
                        dropdown.style.top = "30px";
                        dropdown.style.bottom = "auto";
                    }
                    dropdown.style.display = "block";
                });

                dotContainer.appendChild(dot);
                dotContainer.appendChild(dropdown);
                td.appendChild(dotContainer);

                // Contrainte input (hidden by default)
                const contrainteInput = document.createElement("input");
                contrainteInput.type = "text";
                contrainteInput.className = "contrainte-input";
                contrainteInput.dataset.membreId = membreId;
                contrainteInput.dataset.jour = jour;
                contrainteInput.placeholder = "...";
                contrainteInput.value = contrainteActuelle;
                contrainteInput.style.display = (statutActuel === "contrainte_horaire" || statutActuel === "abstention") ? "block" : "none";
                contrainteInput.style.marginTop = "4px";
                contrainteInput.addEventListener("input", () => sauvegarderEdt(membreId));
                td.appendChild(contrainteInput);

                tr.appendChild(td);
            }
            return tr;
        }

        function getColorForStatut(statut) {
            const map = {
                absent_reponse: "#666",
                present: "#4CAF50",
                absent: "#f44336",
                contrainte_horaire: "#FF9800",
                abstention: "#6A1B9A"
            };
            return map[statut] || "#666";
        }

        function selectStatut(membreId, jour, value, dot, dropdown) {
            dot.dataset.value = value;
            dot.style.background = getColorForStatut(value);
            dropdown.style.display = "none";
            const td = dot.closest("td");
            const contrainteInput = td.querySelector(".contrainte-input");
            if (value === "contrainte_horaire" || value === "abstention") {
                contrainteInput.style.display = "block";
                contrainteInput.placeholder = value === "contrainte_horaire" ? "Arrive \u00e0..." : "Contrainte...";
            } else {
                contrainteInput.style.display = "none";
            }
            sauvegarderEdt(membreId);
        }

        let saveTimeout = null;

        async function sauvegarderEdt(membreId) {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveIndicator.textContent = "Sauvegarde...";
            saveTimeout = setTimeout(async () => {
                const edt = {};
                for (const jour of JOURS) {
                    const dot = document.querySelector(`div[data-membre-id="${membreId}"][data-jour="${jour}"]`);
                    if (!dot) continue;
                    const td = dot.closest("td");
                    const contrainteInput = td.querySelector(".contrainte-input");
                    edt[jour] = {
                        statut: dot.dataset.value || "absent_reponse",
                        contrainte: contrainteInput.style.display !== "none" ? contrainteInput.value : ""
                    };
                }
                try {
                    await setDoc(doc(db, "membres", membreId), { edt }, { merge: true });
                    saveIndicator.textContent = "Sauvegard\u00e9 \u2713";
                    setTimeout(() => { saveIndicator.textContent = ""; }, 2000);
                    chargerTableauGeneral();
                } catch (e) {
                    saveIndicator.textContent = "Erreur de sauvegarde";
                    console.error("Erreur sauvegarde", e);
                }
            }, 2000);
        }
        document.addEventListener("click", () => {
            document.querySelectorAll(".statut-dropdown").forEach(d => d.style.display = "none");
        });
    </script>
</body>
</html>
