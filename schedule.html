    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, doc, getDocs, setDoc, getDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTkuOD4jnR3tvmkAxKR5UM0nB6RNqWC1M",
            authDomain: "premierteam-plouf.firebaseapp.com",
            projectId: "premierteam-plouf",
            storageBucket: "premierteam-plouf.firebasestorage.app",
            messagingSenderId: "511246296521",
            appId: "1:511246296521:web:2f4b07c682ee25dd6d3418"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const JOURS = ["lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi", "dimanche"];
        const CALENDRIER = [
            { jour: "Lu", horaire: "&mdash;", type: "off" },
            { jour: "Ma", horaire: "&mdash;", type: "off" },
            { jour: "Me", horaire: "19h-20h", type: "entrainement" },
            { jour: "Je", horaire: "19h-20h", type: "match" },
            { jour: "Ve", horaire: "20h-21h", type: "entrainement" },
            { jour: "Sa", horaire: "20h-21h", type: "match" },
            { jour: "Di", horaire: "19h-20h", type: "match" }
        ];
        const NOMS_JOURS = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];

        const MEMBRES_DATA = [
            { id: "morgane", nom: "Morgane", surnom: "MK", mdp: "14022019", mdp_admin: "Admin_mk_11" },
            { id: "enzo", nom: "Enzo", surnom: "Misu", mdp: "2323", mdp_admin: "Admin_misu_12" },
            { id: "jules", nom: "Jules", surnom: "FDM", mdp: "julesf0128" },
            { id: "sebastien", nom: "Sébastien", surnom: "Pollux", mdp: "Honda06+" },
            { id: "orphee", nom: "Orphée", surnom: "Orphée", mdp: "jemeraivoiralexiaenrobedechambre69" },
            { id: "octave", nom: "Octave", surnom: "sacadUwU", mdp: "motdepasse.1" },
            { id: "clement", nom: "Clément", surnom: "Clemrsse", mdp: "clemrsse123" }
        ];

        let weekOffset = 0;

        async function seedFirestore() {
            try {
                const snapshot = await getDocs(collection(db, "membres"));
                if (snapshot.size > 0) return;

                for (const m of MEMBRES_DATA) {
                    let edt = {};
                    const semaineKey = getWeekKey(0);
                    edt[semaineKey] = {};
                    for (const jour of JOURS) {
                        edt[semaineKey][jour] = { statut: "absent_reponse", contrainte: "" };
                    }
                    await setDoc(doc(db, "membres", m.id), {
                        nom: m.nom,
                        mdp: m.mdp,
                            ...(m.mdp_admin ? { mdp_admin: m.mdp_admin } : {}),
                        edt
                    });
                }
                console.log("Firestore peupl\u00e9 avec les 7 membres");
            } catch (e) {
                console.error("Erreur seed Firestore :", e);
            }
        }
        seedFirestore();

        async function migrerEdtSiNecessaire() {
            const snapshot = await getDocs(collection(db, "membres"));
            const semaineKey = getWeekKey(0);
            for (const d of snapshot.docs) {
                const data = d.data();
                if (!data.edt) continue;
                const hasNewFormat = Object.keys(data.edt).some(k => /^\d{4}-\d{2}-\d{2}$/.test(k));
                // Si edt a des clés comme "lundi", "mardi"... (ancien format) et PAS de nouveau format
                if (!hasNewFormat && data.edt.lundi && typeof data.edt.lundi === "object" && data.edt.lundi.statut) {
                    const newEdt = { [semaineKey]: {} };
                    for (const jour of JOURS) {
                        newEdt[semaineKey][jour] = data.edt[jour] || { statut: "absent_reponse", contrainte: "" };
                    }
                    await setDoc(doc(db, "membres", d.id), { edt: newEdt }, { merge: true });
                }
            }
        }
        migrerEdtSiNecessaire();
        initNavigation();
        updateWeekLabel();

        function getWeekDates(offset = 0) {
            const now = new Date();
            const day = now.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            const monday = new Date(now);
            monday.setDate(now.getDate() + diff + offset * 7);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                const dd = String(d.getDate()).padStart(2, "0");
                const mm = String(d.getMonth() + 1).padStart(2, "0");
                dates.push(dd + "/" + mm);
            }
            return dates;
        }

        function isPastDay(weekOffset, dayIndex) {
            const now = new Date();
            const currentDay = now.getDay();
            const diff = currentDay === 0 ? -6 : 1 - currentDay;
            const monday = new Date(now);
            monday.setDate(now.getDate() + diff + weekOffset * 7);
            const target = new Date(monday);
            target.setDate(monday.getDate() + dayIndex);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return target < today;
        }

        function getWeekKey(offset = 0) {
            const now = new Date();
            const day = now.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            const monday = new Date(now);
            monday.setDate(now.getDate() + diff + offset * 7);
            const y = monday.getFullYear();
            const m = String(monday.getMonth() + 1).padStart(2, "0");
            const d = String(monday.getDate()).padStart(2, "0");
            return y + "-" + m + "-" + d; 
        }

        const pseudoOverrides = {};

        async function chargerPseudoFirestore(id) {
            try {
                const snap = await getDoc(doc(db, "membres", id));
                if (snap.exists() && snap.data().pseudo) {
                    pseudoOverrides[id] = snap.data().pseudo;
                }
            } catch (e) {}
        }

        function getSurnom(id) {
            if (pseudoOverrides[id]) return pseudoOverrides[id];
            const m = MEMBRES_DATA.find(m => m.id === id);
            return m ? m.surnom : id;
        }

        function validerContrainteHoraire(jour, contrainte) {
            const cal = CALENDRIER[JOURS.indexOf(jour)];
            const m = contrainte.match(/(\d{1,2})h(\d{2})?/);
            if (!m) return true;
            const hour = parseInt(m[1]);
            const startHour = parseInt(cal.horaire.split("h")[0]);
            const endHour = parseInt(cal.horaire.split("-")[1]);
            return hour >= startHour && hour < endHour;
        }

        async function getGameInfo(weekKey, membres, jourIndex) {
            const jour = JOURS[jourIndex];
            const cal = CALENDRIER[jourIndex];
            if (cal.type === "off") return { time: "Rien", players: "", count: 0, cancelled: false, selectedSurnoms: [], allGreens: [] };
            const greens = [], oranges = [], violets = [];
            for (const membre of membres) {
                const semaineEdt = membre.edt?.[weekKey] || {};
                const statut = semaineEdt[jour]?.statut || "absent_reponse";
                const contrainte = semaineEdt[jour]?.contrainte || "";
                if (statut === "present" && contrainte && !validerContrainteHoraire(jour, contrainte)) {
                    continue;
                }
                if (statut === "present") greens.push({ surnom: getSurnom(membre.id), contrainte });
                else if (statut === "contrainte_horaire") oranges.push({ surnom: getSurnom(membre.id), contrainte });
                else if (statut === "abstention") violets.push({ surnom: getSurnom(membre.id), contrainte });
            }
            const totalAvailable = greens.length + oranges.length + violets.length;
            const cancelled = totalAvailable < 5;
            let selected;
            if (cancelled) {
                selected = [...greens, ...oranges, ...violets];
            } else if (greens.length > 5) {
                // Roulette auto : stockée dans Firestore
                const rouletteRef = doc(db, "roulettes", weekKey);
                let rouletteData = {};
                try {
                    const snap = await getDoc(rouletteRef);
                    if (snap.exists()) rouletteData = snap.data();
                } catch (e) {}
                let stored = rouletteData[jour];
                if (stored && Array.isArray(stored) && stored.length === 5) {
                    selected = stored.map(name => greens.find(x => x.surnom === name) || { surnom: name, contrainte: "" });
                    if (selected.length < 5) stored = null;
                }
                if (!stored) {
                    const shuffled = [...greens].sort(() => Math.random() - 0.5);
                    selected = shuffled.slice(0, 5);
                    rouletteData[jour] = selected.map(s => s.surnom);
                    try {
                        await setDoc(rouletteRef, rouletteData, { merge: true });
                    } catch (e) {}
                }
            } else {
                // Si totalAvailable >= 5 et greens.length <= 5, sélectionner tous les greens + les oranges les plus tôt
                // Ex: 4 verts + 2 oranges → sélectionner tous les 4 verts + l'orange le plus tôt
                const allCandidates = [...greens, ...oranges, ...violets];
                // Trier les oranges par heure de contrainte (la plus tôt en premier)
                const sortedOranges = oranges.sort((a, b) => {
                    const timeA = a.contrainte.match(/(\d{1,2})h(\d{2})?/);
                    const timeB = b.contrainte.match(/(\d{1,2})h(\d{2})?/);
                    if (!timeA || !timeB) return 0;
                    const totalA = parseInt(timeA[1]) * 60 + (timeA[2] ? parseInt(timeA[2]) : 0);
                    const totalB = parseInt(timeB[1]) * 60 + (timeB[2] ? parseInt(timeB[2]) : 0);
                    return totalA - totalB;
                });
                // Sélectionner tous les greens + les oranges les plus tôt pour atteindre 5 joueurs
                const needed = Math.min(5, greens.length + sortedOranges.length);
                const earliestOranges = sortedOranges.slice(0, needed - greens.length);
                selected = [...greens, ...earliestOranges];
                if (selected.length > 5) selected = selected.slice(0, 5);
            }
            const typeLabel = cal.type === "entrainement" ? "entrainement" : "match";
            const scheduledStart = parseInt(cal.horaire.split("h")[0]);
            const endHour = parseInt(cal.horaire.split("-")[1]);
            let timeDisplay;
            if (cancelled) {
                timeDisplay = "<s>" + scheduledStart + "h-" + endHour + "h " + typeLabel + "</s> <b>ANNULE</b>";
            } else {
                let maxTime = -1;
                for (const s of selected) {
                    const o = oranges.find(x => x.surnom === s.surnom);
                    if (o && o.contrainte) {
                        const m = o.contrainte.match(/(\d{1,2})h(\d{2})?/);
                        if (m) {
                            const total = parseInt(m[1]) * 60 + (m[2] ? parseInt(m[2]) : 0);
                            if (total > maxTime) maxTime = total;
                        }
                    }
                }
                let startDisplay;
                if (maxTime >= 0) {
                    const h = Math.floor(maxTime / 60);
                    const min = maxTime % 60;
                    startDisplay = h + "h" + (min > 0 ? String(min).padStart(2, "0") : "");
                } else {
                    startDisplay = scheduledStart + "h";
                }
                timeDisplay = startDisplay + " " + typeLabel;
            }
            return {
                time: timeDisplay,
                players: selected.map(s => s.surnom).join(", "),
                count: selected.length,
                cancelled,
                selectedSurnoms: selected.map(s => s.surnom),
                allGreens: greens.map(s => s.surnom)
            };
        }

        async function chargerTableauGeneral() {
            const head = document.getElementById("generalTableHead");
            const tbody = document.getElementById("generalTableBody");
            if (!head || !tbody) return;

            head.innerHTML = "";
            const weekDates = getWeekDates(weekOffset);
            const tr = document.createElement("tr");
            const thLabel = document.createElement("th");
            thLabel.textContent = "Membres";
            tr.appendChild(thLabel);

            for (let i = 0; i < 7; i++) {
                const th = document.createElement("th");
                const cal = CALENDRIER[i];
                if (cal.type === "off" || isPastDay(weekOffset, i)) {
                    th.style.background = "rgba(0,0,0,0.15)";
                    th.style.color = "rgba(255,255,255,0.4)";
                }
                th.innerHTML = NOMS_JOURS[i] +
                    "<br><span style='font-size:0.75rem;font-weight:normal;'>" + weekDates[i] +
                    "</span><br><span style='font-size:0.75rem;font-weight:normal;'>" + cal.horaire +
                    "</span><br><span style='font-size:0.7rem;font-weight:normal;opacity:0.8;'>" +
                    (cal.type === "off" ? "" : (cal.type === "entrainement" ? "Entra\u00eenement" : "Match")) + "</span>";
                tr.appendChild(th);
            }
            head.appendChild(tr);

            // Corps
            tbody.innerHTML = "";
            const snapshot = await getDocs(collection(db, "membres"));
            const membres = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            membres.sort((a, b) => MEMBRES_DATA.findIndex(m => m.id === a.id) - MEMBRES_DATA.findIndex(m => m.id === b.id));

            for (const membre of membres) {
                const tr = document.createElement("tr");
                const tdNom = document.createElement("td");
                tdNom.textContent = membre.nom || membre.id;
                tdNom.style.fontWeight = "bold";
                tr.appendChild(tdNom);

                for (let i = 0; i < JOURS.length; i++) {
                    const td = document.createElement("td");
                    const jour = JOURS[i];
                    const cal = CALENDRIER[i];

                    if (cal.type === "off") {
                        td.style.background = "rgba(0,0,0,0.12)";
                        td.textContent = "\u2014";
                        td.style.color = "rgba(255,255,255,0.3)";
                    } else if (isPastDay(weekOffset, i)) {
                        td.style.background = "rgba(0,0,0,0.12)";
                        const weekKey = getWeekKey(weekOffset);
                        const semaineEdt = membre.edt?.[weekKey] || {};
                        const statut = semaineEdt[jour]?.statut || "absent_reponse";
                        const contrainte = semaineEdt[jour]?.contrainte || "";
                        const dot = document.createElement("div");
                        dot.style.width = "20px";
                        dot.style.height = "20px";
                        dot.style.borderRadius = "50%";
                        dot.style.margin = "0 auto";
                        dot.style.background = getColorForStatut(statut);
                        dot.style.border = "2px solid rgba(255,255,255,0.1)";
                        dot.style.opacity = "0.35";
                        td.appendChild(dot);
                        if ((statut === "contrainte_horaire" || statut === "abstention") && contrainte) {
                            const label = document.createElement("div");
                            label.style.fontSize = "0.6rem";
                            label.style.color = "rgba(255,255,255,0.5)";
                            label.style.marginTop = "2px";
                            label.textContent = contrainte;
                            td.appendChild(label);
                        }
                    } else {
                        const weekKey = getWeekKey(weekOffset);
                        const semaineEdt = membre.edt?.[weekKey] || {};
                        const statut = semaineEdt[jour]?.statut || "absent_reponse";
                        const contrainte = semaineEdt[jour]?.contrainte || "";
                        const dot = document.createElement("div");
                        dot.style.width = "20px";
                        dot.style.height = "20px";
                        dot.style.borderRadius = "50%";
                        dot.style.margin = "0 auto";
                        dot.style.background = getColorForStatut(statut);
                        dot.style.border = "2px solid rgba(255,255,255,0.3)";
                        td.appendChild(dot);
                        if ((statut === "contrainte_horaire" || statut === "abstention") && contrainte) {
                            const label = document.createElement("div");
                            label.style.fontSize = "0.6rem";
                            label.style.color = "rgba(255,255,255,0.6)";
                            label.style.marginTop = "2px";
                            label.textContent = contrainte;
                            td.appendChild(label);
                        }
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }

            // Ligne Game
            if (membres.length > 0) {
                const weekKey = getWeekKey(weekOffset);
                const trGame = document.createElement("tr");
                const tdGameLabel = document.createElement("td");
                tdGameLabel.textContent = "Game";
                tdGameLabel.style.fontWeight = "bold";
                tdGameLabel.style.background = "rgba(255,255,255,0.05)";
                trGame.appendChild(tdGameLabel);
                const allInfos = [];
                for (let i = 0; i < 7; i++) {
                    const td = document.createElement("td");
                    const jour = JOURS[i];
                    const cal = CALENDRIER[i];
                    if (cal.type === "off") {
                        td.style.background = "rgba(0,0,0,0.12)";
                        td.textContent = "Rien";
                        td.style.color = "rgba(255,255,255,0.3)";
                        td.style.fontSize = "0.75rem";
                        allInfos.push(null);
                    } else {
                        const info = await getGameInfo(weekKey, membres, i);
                        allInfos.push(info);
                        if (isPastDay(weekOffset, i)) {
                            td.style.background = "rgba(0,0,0,0.08)";
                        }
                        td.style.fontSize = "0.7rem";
                        td.style.lineHeight = "1.3";
                        td.style.padding = "6px";
                        let constraintInfo = "";
                        if (info.allGreens && info.allGreens.length > 0 && info.selectedSurnoms && info.selectedSurnoms.length > 0) {
                            const oranges = membres.filter(m => {
                                const semaineEdt = m.edt?.[weekKey] || {};
                                const jour = JOURS[i];
                                const statut = semaineEdt[jour]?.statut;
                                const contrainte = semaineEdt[jour]?.contrainte;
                                return statut === "contrainte_horaire" && contrainte;
                            });
                            if (oranges.length > 0) {
                                const maxTime = oranges.reduce((max, o) => {
                                    const semaineEdt = o.edt?.[weekKey] || {};
                                    const jour = JOURS[i];
                                    const contrainte = semaineEdt[jour]?.contrainte;
                                    const m = contrainte.match(/(\d{1,2})h(\d{2})?/);
                                    if (!m) return max;
                                    const total = parseInt(m[1]) * 60 + (m[2] ? parseInt(m[2]) : 0);
                                    return Math.max(max, total);
                                }, -1);
                                if (maxTime >= 0) {
                                    const h = Math.floor(maxTime / 60);
                                    const min = maxTime % 60;
                                    constraintInfo = " (contrainte: " + h + "h" + (min > 0 ? String(min).padStart(2, "0") : "") + ")";
                                }
                            }
                        }
                        td.innerHTML = "<div>" + info.time + "</div><div style='font-size:0.65rem;opacity:0.8;'>" + info.count + " joueur" + (info.count > 1 ? "s" : "") + " : " + info.players + constraintInfo + "</div>";
                    }
                    trGame.appendChild(td);
                }
                tbody.appendChild(trGame);
                // Roulette display
                let rouletteParts = [];
                for (let i = 0; i < 7; i++) {
                    const info = allInfos[i];
                    if (!info || info.cancelled || info.allGreens.length <= 5) continue;
                    const date = weekDates[i];
                    const selected = info.selectedSurnoms;
                    const notSelected = info.allGreens.filter(s => !selected.includes(s));
                    const bold = selected.join(", ");
                    const faded = notSelected.map(s => `<span style="text-decoration:line-through;opacity:0.5;">${s}</span>`).join(" ");
                    rouletteParts.push(`<b>roulette du ${date}</b> : ${bold} ${faded}`);
                }
                const rd = document.querySelector("#navGeneral .roulette-display");
                if (rd) rd.innerHTML = rouletteParts.join(" &nbsp;|&nbsp; ");
            }
        }

        function initNavigation() {
            const navBase = '<button class="btn btn-secondary nav-prev">&#9664;</button>' +
                '<span class="week-label" style="font-size:1.1rem;font-weight:bold;min-width:220px;text-align:center;">Semaine du ...</span>' +
                '<button class="btn btn-secondary nav-next">&#9654;</button>' +
                '<button class="btn btn-secondary nav-today">Semaine actuelle</button>';
            document.getElementById("navPerso").innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:15px;margin:10px 0 20px 0;flex-wrap:wrap;">' + navBase + '</div>';
            document.getElementById("navGeneral").innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:15px;margin:10px 0 20px 0;flex-wrap:wrap;"><span class="roulette-display" style="font-size:0.8rem;color:#aaa;"></span>' + navBase + '</div>';
            document.querySelectorAll("#navPerso .nav-prev, #navGeneral .nav-prev")
                .forEach(b => b.addEventListener("click", () => changeWeek(-1)));
            document.querySelectorAll("#navPerso .nav-next, #navGeneral .nav-next")
                .forEach(b => b.addEventListener("click", () => changeWeek(1)));
            document.querySelectorAll("#navPerso .nav-today, #navGeneral .nav-today")
                .forEach(b => b.addEventListener("click", goToToday));
        }

        function goToToday() {
            weekOffset = 0;
            updateWeekLabel();
            chargerTableauGeneral();
            if (currentMembreId) refreshEdtPerso();
        }

        function changeWeek(delta) {
            weekOffset = Math.max(-3, Math.min(7, weekOffset + delta));
            updateWeekLabel();
            chargerTableauGeneral();
            if (currentMembreId) refreshEdtPerso();
        }

        function updateWeekLabel() {
            const now = new Date();
            const day = now.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            const monday = new Date(now);
            monday.setDate(now.getDate() + diff + weekOffset * 7);
            const dd = String(monday.getDate()).padStart(2, "0");
            const mm = String(monday.getMonth() + 1).padStart(2, "0");
            const yyyy = monday.getFullYear();
            const label = "Semaine du " + dd + "/" + mm + "/" + yyyy;
            document.querySelectorAll(".week-label").forEach(el => el.textContent = label);
        }

        async function refreshEdtPerso() {
            if (!currentMembreId) return;
            const snap = await getDoc(doc(db, "membres", currentMembreId));
            if (snap.exists()) afficherEdtPersonnel(snap.data());
        }

        chargerTableauGeneral();

        const stateButton = document.getElementById("stateButton");
        const stateLogin = document.getElementById("stateLogin");
        const stateEdt = document.getElementById("stateEdt");
        const btnModifier = document.getElementById("btnModifier");
        const btnValider = document.getElementById("btnValider");
        const btnFermerLogin = document.getElementById("btnFermerLogin");
        const btnDeconnexion = document.getElementById("btnDeconnexion");
        const mdpInput = document.getElementById("mdpInput");
        const loginError = document.getElementById("loginError");
        const edtPersonnelContainer = document.getElementById("edtPersonnelContainer");
        const saveIndicator = document.getElementById("saveIndicator");

        let currentMembreId = null;
        let currentIsAdmin = false;

        // Restaurer la session
        const savedId = sessionStorage.getItem("membreId");
        const savedAdmin = sessionStorage.getItem("isAdmin");
        if (savedId && savedAdmin !== null) {
            currentMembreId = savedId;
            currentIsAdmin = savedAdmin === "true";
            await chargerPseudoFirestore(savedId);
            // Recharger l'EDT perso
            const snap = await getDoc(doc(db, "membres", savedId));
            if (snap.exists()) {
                afficherEdtPersonnel(snap.data());
                showState("edt");
            }
        }

        function showState(state) {
            stateButton.style.display = "none";
            stateLogin.style.display = "none";
            stateEdt.style.display = "none";
            if (state === "button") stateButton.style.display = "block";
            else if (state === "login") stateLogin.style.display = "block";
            else if (state === "edt") stateEdt.style.display = "block";
        }

        btnModifier.addEventListener("click", () => {
            mdpInput.value = "";
            loginError.textContent = "";
            showState("login");
        });

        btnFermerLogin.addEventListener("click", () => showState("button"));
        mdpInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") btnValider.click();
        });
        btnDeconnexion.addEventListener("click", () => {
            currentMembreId = null;
            currentIsAdmin = false;
            sessionStorage.removeItem("membreId");
            sessionStorage.removeItem("isAdmin");
            showState("button");
        });

        btnValider.addEventListener("click", async () => {
            const mdp = mdpInput.value.trim();
            if (!mdp) return;

            // Vérifier d'abord les mots de passe admin
            const qAdmin = query(collection(db, "membres"), where("mdp_admin", "==", mdp));
            const adminSnapshot = await getDocs(qAdmin);

            let membreId = null;
            let membreData = null;
            let isAdmin = false;

            if (adminSnapshot.size > 0) {
                membreId = adminSnapshot.docs[0].id;
                membreData = adminSnapshot.docs[0].data();
                isAdmin = true;
            } else {
                const q = query(collection(db, "membres"), where("mdp", "==", mdp));
                const snapshot = await getDocs(q);
                if (snapshot.size > 0) {
                    membreId = snapshot.docs[0].id;
                    membreData = snapshot.docs[0].data();
                    isAdmin = false;
                }
            }

            if (!membreId) {
                loginError.textContent = "Mot de passe incorrect";
                return;
            }

            currentMembreId = membreId;
            currentIsAdmin = isAdmin;
            sessionStorage.setItem("membreId", currentMembreId);
            sessionStorage.setItem("isAdmin", currentIsAdmin);
            await chargerPseudoFirestore(membreId);
            loginError.textContent = "";
            afficherEdtPersonnel(membreData);
            showState("edt");
        });

        function createTh(text) {
            const th = document.createElement("th");
            th.textContent = text;
            return th;
        }

        async function createMembreRow(membreId, surnom) {
            const tr = document.createElement("tr");
            const tdNom = document.createElement("td");
            tdNom.textContent = surnom;
            tdNom.style.fontWeight = "bold";
            tdNom.style.fontSize = "0.9rem";
            tr.appendChild(tdNom);

            let edtData = {};
            try {
                const snap = await getDoc(doc(db, "membres", membreId));
                if (snap.exists()) {
                    const data = snap.data();
                    const semaineKey = getWeekKey(weekOffset);
                    edtData = data.edt?.[semaineKey] || {};
                }
            } catch (e) {
                console.error("Erreur chargement", membreId, e);
            }

            for (let i = 0; i < JOURS.length; i++) {
                const td = document.createElement("td");
                const jour = JOURS[i];
                if (CALENDRIER[i].type === "off") {
                    td.style.background = "rgba(0,0,0,0.12)";
                    td.textContent = "\u2014";
                    td.style.color = "rgba(255,255,255,0.3)";
                    tr.appendChild(td);
                    continue;
                }
                if (isPastDay(weekOffset, i)) {
                    td.style.background = "rgba(0,0,0,0.12)";
                    const statutActuel = edtData?.[jour]?.statut || "absent_reponse";
                    const dot = document.createElement("div");
                    dot.style.width = "24px";
                    dot.style.height = "24px";
                    dot.style.borderRadius = "50%";
                    dot.style.margin = "0 auto";
                    dot.style.background = getColorForStatut(statutActuel);
                    dot.style.border = "2px solid rgba(255,255,255,0.1)";
                    dot.style.opacity = "0.35";
                    td.appendChild(dot);
                    tr.appendChild(td);
                    continue;
                }
                td.style.padding = "6px";

                const dotContainer = document.createElement("div");
                dotContainer.style.position = "relative";
                dotContainer.style.display = "inline-block";

                const dot = document.createElement("div");
                dot.style.width = "24px";
                dot.style.height = "24px";
                dot.style.borderRadius = "50%";
                dot.style.cursor = "pointer";
                dot.style.border = "2px solid rgba(255,255,255,0.3)";
                dot.style.transition = "transform 0.2s";
                dot.dataset.membreId = membreId;
                dot.dataset.jour = jour;

                const statutActuel = edtData?.[jour]?.statut || "absent_reponse";
                const contrainteActuelle = edtData?.[jour]?.contrainte || "";
                dot.dataset.value = statutActuel;
                dot.dataset.contrainte = contrainteActuelle;
                dot.style.background = getColorForStatut(statutActuel);

                dot.addEventListener("mouseenter", () => { dot.style.transform = "scale(1.2)"; });
                dot.addEventListener("mouseleave", () => { dot.style.transform = "scale(1)"; });

                // Dropdown menu
                const dropdown = document.createElement("div");
                dropdown.className = "statut-dropdown";
                dropdown.style.display = "none";
                dropdown.style.position = "absolute";
                dropdown.style.top = "30px";
                dropdown.style.left = "50%";
                dropdown.style.transform = "translateX(-50%)";
                dropdown.style.background = "#333";
                dropdown.style.borderRadius = "6px";
                dropdown.style.padding = "4px 0";
                dropdown.style.zIndex = "10";
                dropdown.style.boxShadow = "0 4px 12px rgba(0,0,0,0.3)";
                dropdown.style.minWidth = "40px";

                const colors = [
                    { value: "absent_reponse", color: "#666" },
                    { value: "present", color: "#4CAF50" },
                    { value: "absent", color: "#f44336" },
                    { value: "contrainte_horaire", color: "#FF9800" },
                    { value: "abstention", color: "#6A1B9A" }
                ];

                for (const c of colors) {
                    const opt = document.createElement("div");
                    opt.style.width = "28px";
                    opt.style.height = "28px";
                    opt.style.borderRadius = "50%";
                    opt.style.background = c.color;
                    opt.style.margin = "4px auto";
                    opt.style.cursor = "pointer";
                    opt.style.border = "2px solid transparent";
                    opt.dataset.value = c.value;
                    opt.addEventListener("click", (e) => {
                        e.stopPropagation();
                        selectStatut(membreId, jour, c.value, dot, dropdown);
                    });
                    opt.addEventListener("mouseenter", () => { opt.style.borderColor = "#fff"; });
                    opt.addEventListener("mouseleave", () => { opt.style.borderColor = "transparent"; });
                    dropdown.appendChild(opt);
                }

                dot.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const allDropdowns = document.querySelectorAll(".statut-dropdown");
                    allDropdowns.forEach(d => d.style.display = "none");
                    const rect = td.getBoundingClientRect();
                    const spaceBelow = window.innerHeight - rect.bottom;
                    if (spaceBelow < 200) {
                        dropdown.style.top = "auto";
                        dropdown.style.bottom = "30px";
                    } else {
                        dropdown.style.top = "30px";
                        dropdown.style.bottom = "auto";
                    }
                    dropdown.style.display = "block";
                });

                dotContainer.appendChild(dot);
                dotContainer.appendChild(dropdown);
                td.appendChild(dotContainer);

                // Contrainte : select pour orange (heure), input text pour violet (justification)
                const contrainteSelect = document.createElement("select");
                contrainteSelect.className = "contrainte-select";
                contrainteSelect.dataset.membreId = membreId;
                contrainteSelect.dataset.jour = jour;
                contrainteSelect.style.display = statutActuel === "contrainte_horaire" ? "block" : "none";
                contrainteSelect.style.marginTop = "4px";
                contrainteSelect.style.width = "100%";
                const optionVide = document.createElement("option");
                optionVide.value = "";
                optionVide.textContent = "...";
                contrainteSelect.appendChild(optionVide);
                const cal = CALENDRIER[i];
                const startHour = parseInt(cal.horaire.split("h")[0]);
                const endHour = parseInt(cal.horaire.split("-")[1]);
                for (let h = startHour; h < endHour; h++) {
                    for (let m = 0; m < 60; m += 5) {
                        const timeStr = h + "h" + (m < 10 ? "0" + m : m);
                        const option = document.createElement("option");
                        option.value = timeStr;
                        option.textContent = timeStr;
                        contrainteSelect.appendChild(option);
                    }
                }
                contrainteSelect.value = statutActuel === "contrainte_horaire" ? contrainteActuelle : "";
                contrainteSelect.addEventListener("change", () => sauvegarderEdt(membreId));
                td.appendChild(contrainteSelect);

                const contrainteInput = document.createElement("input");
                contrainteInput.type = "text";
                contrainteInput.className = "contrainte-input-text";
                contrainteInput.dataset.membreId = membreId;
                contrainteInput.dataset.jour = jour;
                contrainteInput.placeholder = "Raison...";
                contrainteInput.style.display = statutActuel === "abstention" ? "block" : "none";
                contrainteInput.style.marginTop = "4px";
                contrainteInput.style.width = "100%";
                contrainteInput.style.boxSizing = "border-box";
                contrainteInput.value = statutActuel === "abstention" ? contrainteActuelle : "";
                contrainteInput.addEventListener("input", () => sauvegarderEdt(membreId));
                td.appendChild(contrainteInput);

                tr.appendChild(td);
            }
            return tr;
        }

        function getColorForStatut(statut) {
            const map = {
                absent_reponse: "#666",
                present: "#4CAF50",
                absent: "#f44336",
                contrainte_horaire: "#FF9800",
                abstention: "#6A1B9A"
            };
            return map[statut] || "#666";
        }

        function selectStatut(membreId, jour, value, dot, dropdown) {
            dot.dataset.value = value;
            dot.style.background = getColorForStatut(value);
            dropdown.style.display = "none";
            const td = dot.closest("td");
            const contrainteSelect = td.querySelector(".contrainte-select");
            const contrainteInput = td.querySelector(".contrainte-input-text");
            contrainteSelect.style.display = value === "contrainte_horaire" ? "block" : "none";
            contrainteInput.style.display = value === "abstention" ? "block" : "none";
            sauvegarderEdt(membreId);
        }

        async function sauvegarderEdt(membreId) {
            const weekKey = getWeekKey(weekOffset);
            const edtSemaine = {};
            for (const jour of JOURS) {
                const dot = document.querySelector(`div[data-membre-id="${membreId}"][data-jour="${jour}"]`);
                if (!dot) continue;
                const td = dot.closest("td");
                const contrainteSelect = td.querySelector(".contrainte-select");
                const contrainteInput = td.querySelector(".contrainte-input-text");
                const statut = dot.dataset.value || "absent_reponse";
                const contrainte = contrainteSelect.style.display !== "none" ? contrainteSelect.value :
                                  contrainteInput.style.display !== "none" ? contrainteInput.value : "";
                if (statut === "contrainte_horaire" && contrainte && !validerContrainteHoraire(jour, contrainte)) {
                    saveIndicator.textContent = "\u274c Heure hors cr\u00e9neau pour " + jour + " !";
                    setTimeout(() => { saveIndicator.textContent = ""; }, 3000);
                    return;
                }
                // Si statut "present" mais contrainte invalide, changer en "contrainte_horaire"
                if (statut === "present" && contrainte && !validerContrainteHoraire(jour, contrainte)) {
                    edtSemaine[jour] = { statut: "contrainte_horaire", contrainte };
                } else {
                    edtSemaine[jour] = { statut, contrainte };
                }
            }
            try {
                const ref = doc(db, "membres", membreId);
                const snap = await getDoc(ref);
                let edt = snap.exists() ? (snap.data().edt || {}) : {};
                edt[weekKey] = edtSemaine;
                await setDoc(ref, { edt }, { merge: true });
                // Vider la roulette stockée → recalcul au prochain chargement
                try {
                    await deleteDoc(doc(db, "roulettes", weekKey));
                } catch (e) {}
                saveIndicator.textContent = "Sauvegard\u00e9 \u2713";
                setTimeout(() => { saveIndicator.textContent = ""; }, 2000);
                chargerTableauGeneral();
            } catch (e) {
                saveIndicator.textContent = "Erreur de sauvegarde";
                console.error("Erreur sauvegarde", e);
            }
        }
        document.addEventListener("click", () => {
            document.querySelectorAll(".statut-dropdown").forEach(d => d.style.display = "none");
        });
    </script>
</body>
</html>
